name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  android:
    name: Android quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Validate JSON config
        run: python -m json.tool config.json > /dev/null

      - name: Ensure sample API key is not replaced
        shell: python
        run: |
          import json
          with open('config.json', encoding='utf-8') as f:
              config = json.load(f)
          api_key = config['providers']['cloud']['api_key']
          if api_key != 'YOUR_GEMINI_API_KEY':
              raise SystemExit('config.json contains a non-placeholder cloud API key')

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Run unit tests
        run: gradle test

      - name: Run ktlint
        run: gradle ktlintCheck

      - name: Run detekt
        run: gradle detekt
